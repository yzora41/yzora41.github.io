<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座位占座系统 - 座位图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .header .tips {
            color: #666;
            font-size: 14px;
        }
        /* 缩放容器核心样式 */
        .zoom-container {
            width: 100%;
            height: calc(100vh - 120px);
            overflow: auto;
            border: 1px solid #ddd;
            background: white;
            touch-action: manipulation; /* 支持触摸缩放 */
        }
        .seat-wrapper {
            transform-origin: 0 0; /* 缩放原点 */
            padding: 20px;
            display: flex;
            align-items: flex-start;
        }
        /* 行号侧边栏样式 */
        .row-numbers {
            margin-right: 10px;
            display: flex;
            flex-direction: column;
        }
        .row-number {
            width: 30px;
            height: 40px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }
        /* 座位区域容器（包含座位+列号） */
        .seat-area {
            display: flex;
            flex-direction: column;
        }
        /* 列号底部栏样式 */
        .col-numbers {
            display: flex;
            margin-left: 5px; /* 对齐座位的margin-right */
        }
        .col-number {
            width: 40px;
            height: 30px;
            margin-right: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }
        .col-number.odd {
            color: #e63946; /* 单数（左）- 红色 */
        }
        .col-number.even {
            color: #457b9d; /* 双数（右）- 蓝色 */
        }
        /* 座位行样式 */
        .seat-row {
            display: flex;
            margin-bottom: 8px;
        }
        /* 座位单元格样式 */
        .seat-cell {
            width: 40px;
            height: 40px;
            margin-right: 5px;
            background-color: #e0e0e0;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        /* 已锁定的座位样式 */
        .seat-cell.locked {
            background-color: red;
            color: white;
            font-weight: bold;
        }
        .seat-cell:hover {
            border: 2px solid #666;
        }
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .back-btn:hover {
            background: #06b058;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">返回首页</button>
    <div class="header">
        <h1>座位平面图（20行 × 44列）</h1>
        <div class="tips">提示：鼠标滚轮/双指可放大缩小，点击座位查看详情 | 列数：左（单数43→1）/ 右（双数2→44）</div>
    </div>

    <!-- 缩放容器 -->
    <div class="zoom-container" id="zoomContainer">
        <div class="seat-wrapper" id="seatWrapper">
            <!-- 行号侧边栏（动态生成） -->
            <div class="row-numbers" id="rowNumbers"></div>
            
            <!-- 座位+列号区域 -->
            <div class="seat-area">
                <!-- 座位行（动态生成） -->
                <div class="seats-container" id="seatsContainer"></div>
                
                <!-- 列号底部栏（动态生成） -->
                <div class="col-numbers" id="colNumbers"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 生成列数排列数组：左（43→41→…→1） + 右（2→4→…→44）
        function generateColOrder() {
            const oddCols = []; // 单数列（43,41,...,1）
            const evenCols = []; // 双数列（2,4,...,44）
            
            // 生成单数列（从43递减到1）
            for (let i = 43; i >= 1; i -= 2) {
                oddCols.push(i);
            }
            
            // 生成双数列（从2递增到44）
            for (let i = 2; i <= 44; i += 2) {
                evenCols.push(i);
            }
            
            // 合并：单数列在前，双数列在后
            return [...oddCols, ...evenCols];
        }
        
        // 获取最终列排列顺序
        const colOrder = generateColOrder(); // [43,41,...,1,2,4,...,44]

        // 2. 初始化数据：从本地存储读取已锁定的座位
        let lockedSeats = JSON.parse(localStorage.getItem('lockedSeats')) || {};
        
        // 3. 获取当前用户选中的座位和ID，锁定该座位
        const selectedSeat = localStorage.getItem('selectedSeat');
        const userId = localStorage.getItem('userId');
        if (selectedSeat && userId) {
            lockedSeats[selectedSeat] = userId;
            localStorage.setItem('lockedSeats', JSON.stringify(lockedSeats));
        }

        // 4. 生成行号侧边栏（1-20行）
        const rowNumbers = document.getElementById('rowNumbers');
        for (let row = 1; row <= 20; row++) {
            const rowNumDiv = document.createElement('div');
            rowNumDiv.className = 'row-number';
            rowNumDiv.textContent = row;
            rowNumbers.appendChild(rowNumDiv);
        }

        // 5. 生成列号底部栏（按自定义顺序排列）
        const colNumbers = document.getElementById('colNumbers');
        colOrder.forEach(col => {
            const colNumDiv = document.createElement('div');
            colNumDiv.className = `col-number ${col % 2 === 1 ? 'odd' : 'even'}`;
            colNumDiv.textContent = col;
            colNumbers.appendChild(colNumDiv);
        });

        // 6. 动态生成20行44列的座位（按自定义列顺序）
        const seatsContainer = document.getElementById('seatsContainer');
        for (let row = 1; row <= 20; row++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'seat-row';
            
            // 按自定义列顺序生成座位
            colOrder.forEach(col => {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'seat-cell';
                
                // 座位唯一标识（如12-26）
                const seatKey = `${row}-${col}`;
                
                // 如果是已锁定的座位，添加样式并显示ID
                if (lockedSeats[seatKey]) {
                    cellDiv.classList.add('locked');
                    cellDiv.textContent = lockedSeats[seatKey];
                }

                // 点击座位显示详情
                cellDiv.onclick = () => {
                    if (lockedSeats[seatKey]) {
                        alert(`座位 ${seatKey}：已被 ${lockedSeats[seatKey]} 锁定`);
                    } else {
                        alert(`座位 ${seatKey}：未被锁定`);
                    }
                };

                rowDiv.appendChild(cellDiv);
            });
            seatsContainer.appendChild(rowDiv);
        }

        // 7. 实现缩放功能（鼠标滚轮/触摸缩放）
        let scale = 1;
        const zoomContainer = document.getElementById('zoomContainer');
        
        // 鼠标滚轮缩放
        zoomContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.max(0.5, Math.min(3, scale));
            seatWrapper.style.transform = `scale(${scale})`;
        });

        // 触摸缩放（手机/平板双指缩放）
        let touchStartDistance = 0;
        let touchStartScale = 1;
        
        zoomContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartDistance = getDistance(e.touches[0], e.touches[1]);
                touchStartScale = scale;
            }
        });

        zoomContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 2) {
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                scale = touchStartScale * (currentDistance / touchStartDistance);
                scale = Math.max(0.5, Math.min(3, scale));
                seatWrapper.style.transform = `scale(${scale})`;
            }
        });

        // 计算两个触摸点之间的距离
        function getDistance(touch1, touch2) {
            const dx = touch2.clientX - touch1.clientX;
            const dy = touch2.clientY - touch1.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }
    </script>
</body>
</html>
